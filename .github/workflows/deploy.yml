name: Deploy static content to Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Запускаем деплой при пуше в ветку main (или master)
  push:
    branches: ['main', 'master']
  # Позволяет запустить workflow вручную из вкладки Actions
  workflow_dispatch:

# Настройка прав доступа для GITHUB_TOKEN, чтобы разрешить деплой в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешает только один одновременный деплой, отменяя текущие в процессе
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Собираем проект для корня кастомного домена
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Папка с результатами сборки Vite (обычно dist)
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
